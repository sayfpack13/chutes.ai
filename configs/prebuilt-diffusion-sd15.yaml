name: prebuilt-diffusion-sd15
chute_type: diffusion
username: your_username
tagline: Diffusion — Stable Diffusion 1.5
description: |-
  # SD 1.5

  Classic runwayml SD 1.5 on Chutes pre-built diffusion template. Chutes ``NodeSelector`` requires at least 16 GB VRAM per GPU even for smaller models.
model:
  source: huggingface
  name: runwayml/stable-diffusion-v1-5
  revision: main
hardware:
  gpu_count: 1
  min_vram_gb_per_gpu: 16
  include: []
  exclude: []
docker:
  base_image: nvidia/cuda:12.1-runtime-ubuntu22.04
  python_version: "3.11"
  system_packages: [git, curl]
  python_packages: []
api:
  - path: /generate
    method: POST
    input_schema: GenerationInput
    output_content_type: image/png
    description: Text-to-image
concurrency: 1
allow_external_egress: false
shutdown_after_seconds: 300
engine_args: {}
template_max_instances: 1
template_scaling_threshold: 0.75
