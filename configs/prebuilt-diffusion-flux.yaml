name: prebuilt-diffusion-flux
chute_type: diffusion
username: your_username
tagline: Diffusion — FLUX.1-dev
description: |-
  # FLUX.1-dev (high VRAM)

  Chutes pre-built diffusion image. Needs a strong GPU — adjust NodeSelector if deploy fails.
model:
  source: huggingface
  name: black-forest-labs/FLUX.1-dev
  revision: main
hardware:
  gpu_count: 1
  min_vram_gb_per_gpu: 48
  include: []
  exclude: []
docker:
  base_image: nvidia/cuda:12.1-runtime-ubuntu22.04
  python_version: "3.11"
  system_packages: [git, curl]
  python_packages: []
api:
  - path: /generate
    method: POST
    input_schema: GenerationInput
    output_content_type: image/png
    description: Text-to-image
concurrency: 1
allow_external_egress: false
shutdown_after_seconds: 300
engine_args: {}
template_max_instances: 1
template_scaling_threshold: 0.75
