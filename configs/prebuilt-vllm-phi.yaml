name: prebuilt-vllm-phi
chute_type: vllm
username: your_username
tagline: vLLM — Phi-3 Mini (lighter GPU)
description: |-
  # vLLM · Microsoft Phi-3 Mini

  Smaller model weights; Chutes still requires at least 16 GB VRAM per GPU in NodeSelector.
model:
  source: huggingface
  name: microsoft/Phi-3-mini-4k-instruct
  revision: main
hardware:
  gpu_count: 1
  min_vram_gb_per_gpu: 16
  include: []
  exclude: []
docker:
  base_image: nvidia/cuda:12.1-runtime-ubuntu22.04
  python_version: "3.11"
  system_packages: [git, curl]
  python_packages: []
api:
  - path: /v1/chat/completions
    method: POST
    input_schema: ChatCompletion
    output_content_type: application/json
    description: OpenAI-compatible chat
concurrency: 32
allow_external_egress: false
shutdown_after_seconds: 300
engine_args:
  trust_remote_code: true
  max_model_len: 4096
template_max_instances: 1
template_scaling_threshold: 0.75
