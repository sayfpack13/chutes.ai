name: llm-template
chute_type: llm
username: your_username
tagline: Large Language Model API
description: '# LLM Text Generation


  OpenAI-compatible text generation API using vLLM backend.


  ## Features

  - OpenAI API compatible

  - Streaming response support

  - Multiple model options

  - Efficient batching

  '
model:
  source: huggingface
  name: meta-llama/Llama-3.1-8B-Instruct
  revision: main
  trust_remote_code: false
  custom_download_url: null
hardware:
  gpu_count: 1
  min_vram_gb_per_gpu: 24
  include:
  - rtx4090
  - a100
  - a10g
  exclude: []
docker:
  base_image: nvidia/cuda:12.1-runtime-ubuntu22.04
  python_version: '3.11'
  system_packages:
  - git
  - curl
  python_packages:
  - vllm>=0.3.0
  - transformers
  - tiktoken
  extra_pip_index: null
  env_vars:
    HF_HOME: /app/models
  image_name: ''
  image_tag: 1.0.0
  image_readme: ''
api:
- path: /v1/chat/completions
  method: POST
  input_schema: ChatCompletionRequest
  output_content_type: application/json
  stream: true
  description: OpenAI-compatible chat completions
- path: /v1/completions
  method: POST
  input_schema: CompletionRequest
  output_content_type: application/json
  stream: false
  description: OpenAI-compatible text completions
- path: /health
  method: GET
  input_schema: None
  output_content_type: application/json
  stream: false
  description: Health check endpoint
concurrency: 64
allow_external_egress: true
shutdown_after_seconds: 300
