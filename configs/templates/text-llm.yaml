name: text-llm-template
chute_type: llm
username: your_username
tagline: Large Language Model API (stub)
description: |-
  # LLM stub

  Extend with vLLM / your stack. Prefer official Chutes templates when possible.
model:
  source: huggingface
  name: meta-llama/Llama-3.1-8B-Instruct
  revision: main
  trust_remote_code: false
  custom_download_url: null
hardware:
  gpu_count: 1
  min_vram_gb_per_gpu: 24
  include:
    - rtx4090
    - a100
    - a10g
  exclude: []
docker:
  base_image: nvidia/cuda:12.1-runtime-ubuntu22.04
  python_version: '3.11'
  system_packages:
    - git
    - curl
  python_packages:
    - vllm>=0.3.0
    - transformers
    - tiktoken
  extra_pip_index: null
  env_vars:
    HF_HOME: /app/models
  image_name: llm-chute
  image_tag: 1.0.0
  image_readme: LLM service
api:
  - path: /v1/chat/completions
    method: POST
    input_schema: ChatCompletionRequest
    output_content_type: application/json
    stream: true
    description: Chat completions
  - path: /health
    method: GET
    input_schema: 'None'
    output_content_type: application/json
    stream: false
    description: Health check
concurrency: 64
allow_external_egress: true
shutdown_after_seconds: 300
