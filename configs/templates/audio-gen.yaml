name: audio-gen-template
chute_type: music
username: your_username
tagline: Audio / music generation (MusicGen)
description: |-
  # Audio generation

  Same scaffold as music-gen; tune model and docker deps for your use case.
model:
  source: huggingface
  name: facebook/musicgen-small
  revision: main
  trust_remote_code: false
  custom_download_url: null
hardware:
  gpu_count: 1
  min_vram_gb_per_gpu: 16
  include:
    - rtx4090
    - rtx3090
    - a100
  exclude: []
docker:
  base_image: nvidia/cuda:12.1-runtime-ubuntu22.04
  python_version: '3.11'
  system_packages:
    - git
    - curl
    - ffmpeg
    - libsndfile1
  python_packages:
    - audiocraft>=1.0.0
    - transformers>=4.30.0
    - accelerate>=0.20.0
    - pydantic>=2.0.0
    - fastapi>=0.100.0
    - loguru>=0.7.0
  extra_pip_index: https://download.pytorch.org/whl/cu121
  env_vars:
    AUDIOCRAFT_CACHE: /app/models
    HF_HOME: /app/models
  image_name: audio-gen-chute
  image_tag: 1.0.0
  image_readme: Audio generation
api:
  - path: /generate
    method: POST
    input_schema: MusicGenerationRequest
    output_content_type: audio/wav
    stream: false
    description: Generate audio
  - path: /health
    method: GET
    input_schema: 'None'
    output_content_type: application/json
    stream: false
    description: Health check
concurrency: 2
allow_external_egress: true
shutdown_after_seconds: 300
