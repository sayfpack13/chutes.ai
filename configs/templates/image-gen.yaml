name: image-gen-template
chute_type: image
username: your_username
tagline: Image generation (stub)
description: |-
  # Image generation stub

  Wire diffusers / SDXL in on_startup.
model:
  source: huggingface
  name: stabilityai/stable-diffusion-xl-base-1.0
  revision: main
  trust_remote_code: false
  custom_download_url: null
hardware:
  gpu_count: 1
  min_vram_gb_per_gpu: 16
  include:
    - rtx4090
    - rtx3090
    - a100
  exclude: []
docker:
  base_image: nvidia/cuda:12.1-runtime-ubuntu22.04
  python_version: '3.11'
  system_packages:
    - git
    - curl
  python_packages:
    - diffusers>=0.25.0
    - transformers
    - accelerate
    - safetensors
    - invisible_watermark
  extra_pip_index: https://download.pytorch.org/whl/cu121
  env_vars:
    HF_HOME: /app/models
  image_name: image-gen-chute
  image_tag: 1.0.0
  image_readme: SDXL image generation
api:
  - path: /generate
    method: POST
    input_schema: ImageGenerationRequest
    output_content_type: image/png
    stream: false
    description: Generate image
  - path: /health
    method: GET
    input_schema: 'None'
    output_content_type: application/json
    stream: false
    description: Health check
concurrency: 2
allow_external_egress: true
shutdown_after_seconds: 300
