# Example ChuteConfig — copy to configs/<name>.yaml
name: my-chute
chute_type: music
username: your_username
tagline: Short one-line description
description: |
  # Markdown readme for your chute listing

  Explain endpoints and usage here.
model:
  source: huggingface
  name: facebook/musicgen-medium
  revision: main
  trust_remote_code: false
hardware:
  gpu_count: 1
  min_vram_gb_per_gpu: 16
  include: []
  exclude: []
docker:
  base_image: nvidia/cuda:12.1-runtime-ubuntu22.04
  python_version: '3.11'
  system_packages: [git, curl, ffmpeg]
  python_packages:
    - audiocraft>=1.0.0
  extra_pip_index: https://download.pytorch.org/whl/cu121
  env_vars:
    HF_HOME: /app/models
  image_name: ''
  image_tag: '1.0.0'
  image_readme: ''
api:
  - path: /generate
    method: POST
    input_schema: MusicGenerationRequest
    output_content_type: audio/wav
    stream: false
    description: Main endpoint
concurrency: 2
allow_external_egress: true
shutdown_after_seconds: 300
