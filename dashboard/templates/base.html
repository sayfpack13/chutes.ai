<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Chutes AI Manager{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="top">
    <a class="brand" href="/">Chutes AI Manager</a>
    <nav>
      <a href="/">Configs</a>
      <a href="/config/new">New chute</a>
      <a href="/api/status" target="_blank">API status (JSON)</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    <span>Edit YAML, generate Python into <code>chute_packages/</code>, then build/deploy with the Chutes CLI.</span>
  </footer>
</body>
</html>
