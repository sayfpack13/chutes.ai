<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Chutes{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="top">
    <a class="brand" href="/">Chutes</a>
    <nav class="main-nav">
      <a href="/">Home</a>
      <a href="/config/new">New chute</a>
      <a href="/playground">Playground</a>
      <a href="/settings/account">Account</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    <span>This app runs on your computer and uses the Chutes command-line tools to build and publish.</span>
    <span class="foot-links"><a href="/diagnostics">Diagnostics</a></span>
  </footer>
</body>
</html>
